name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --lib --bins --tests -- -D warnings

      - name: Build docs
        run: cargo doc --no-deps

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --lib --all

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2

      - name: Install Open vSwitch
        run: |
          sudo apt-get update
          sudo apt-get install -y openvswitch-switch

      - name: Setup test OVSDB
        run: |
          mkdir -p /tmp/ovs-test
          ovsdb-tool create /tmp/ovs-test/conf.db /usr/share/openvswitch/vswitch.ovsschema
          ovsdb-server /tmp/ovs-test/conf.db \
              --remote=punix:/tmp/ovs-test/db.sock \
              --unixctl=/tmp/ovs-test/ovsdb.ctl \
              --pidfile=/tmp/ovs-test/ovsdb.pid \
              --detach
          ovs-vsctl --db=unix:/tmp/ovs-test/db.sock init

      - name: Run integration tests
        env:
          OVSDB_ADDR: unix:/tmp/ovs-test/db.sock
        # rovs-openflow is excluded: its tests need OPENFLOW_ADDR and a running ovs-vswitchd
        run: cargo test --workspace --exclude rovs-openflow -- --ignored --test-threads=1

  examples:
    name: Run Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2

      - name: Install Open vSwitch
        run: |
          sudo apt-get update
          sudo apt-get install -y openvswitch-switch

      - name: Setup test OVSDB
        run: |
          mkdir -p /tmp/ovs-test
          ovsdb-tool create /tmp/ovs-test/conf.db /usr/share/openvswitch/vswitch.ovsschema
          ovsdb-server /tmp/ovs-test/conf.db \
              --remote=punix:/tmp/ovs-test/db.sock \
              --unixctl=/tmp/ovs-test/ovsdb.ctl \
              --pidfile=/tmp/ovs-test/ovsdb.pid \
              --detach
          ovs-vsctl --db=unix:/tmp/ovs-test/db.sock init

      - name: Run examples
        env:
          OVSDB_ADDR: unix:/tmp/ovs-test/db.sock
        run: |
          cargo run --example ovsdb_transaction
          cargo run --example list_bridges
